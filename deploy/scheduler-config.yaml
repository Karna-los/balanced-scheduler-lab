apiVersion: kubescheduler.config.k8s.io/v1
kind: KubeSchedulerConfiguration

clientConnection:
  kubeconfig: /home/user/.kube/config

leaderElection:
  leaderElect: false

profiles:
  - schedulerName: balanced-scheduler
    plugins:
      filter:
        enabled:
          - name: BalancedScheduler
      score:
        enabled:
          - name: BalancedScheduler
            weight: 5
      reserve:
        enabled:
          - name: BalancedScheduler
      permit:
        enabled:
          - name: BalancedScheduler
