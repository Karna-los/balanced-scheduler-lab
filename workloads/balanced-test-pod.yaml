apiVersion: v1
kind: Pod
metadata:
  name: balanced-test-pod
  labels:
    app: balanced-test
spec:
  schedulerName: balanced-scheduler
  containers:
    - name: pause
      image: registry.k8s.io/pause:3.10
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"
