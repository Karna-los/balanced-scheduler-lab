apiVersion: v1
kind: Pod
metadata:
  name: balanced-test-pod
  labels:
    app: balanced-test
spec:
  schedulerName: balanced-scheduler
  containers:
    - name: nginx
      image: nginx:1.27-alpine
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"
