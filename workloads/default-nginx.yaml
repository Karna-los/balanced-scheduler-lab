apiVersion: apps/v1
kind: Deployment
metadata:
  name: default-nginx
  labels:
    app: default-nginx
spec:
  replicas: 3
  selector:
    matchLabels:
      app: default-nginx
  template:
    metadata:
      labels:
        app: default-nginx
    spec:
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
