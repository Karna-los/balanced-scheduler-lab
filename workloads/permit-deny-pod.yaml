apiVersion: v1
kind: Pod
metadata:
  name: permit-deny-pod
  labels:
    app: permit-deny
  annotations:
    balanced-scheduler/permit: "deny"
spec:
  schedulerName: balanced-scheduler
  containers:
    - name: nginx
      image: nginx:1.27-alpine
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
