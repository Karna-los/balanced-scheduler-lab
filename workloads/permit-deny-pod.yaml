apiVersion: v1
kind: Pod
metadata:
  name: permit-deny-pod
  labels:
    app: permit-deny
  annotations:
    balanced-scheduler/permit: "deny"
spec:
  schedulerName: balanced-scheduler
  containers:
    - name: pause
      image: registry.k8s.io/pause:3.10
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
