apiVersion: apps/v1
kind: Deployment
metadata:
  name: baseline-default-scheduler
  labels:
    app: baseline-default-scheduler
spec:
  replicas: 6
  selector:
    matchLabels:
      app: baseline-default-scheduler
  template:
    metadata:
      labels:
        app: baseline-default-scheduler
    spec:
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
